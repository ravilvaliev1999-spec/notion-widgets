<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Google · Files Hub</title>
<style>
  :root {
    --gray-bg: #2f2f2f;     --gray-bg-h: #3a3a3a;     --gray-text: #e6e6e4;  --gray-glow: rgba(180,180,180,.25);
    --blue-bg: #1f3b54;     --blue-bg-h: #264a6b;     --blue-text: #cfe2f3;  --blue-glow: rgba(66,133,244,.35);
    --green-bg: #1c3829;    --green-bg-h: #234734;    --green-text: #cdebd6; --green-glow: rgba(15,157,88,.35);
    --orange-bg: #5c3a1e;   --orange-bg-h: #6e4624;   --orange-text: #f4d8bf;--orange-glow: rgba(244,180,0,.35);
    --border: rgba(255,255,255,.13);
    --border-hover: rgba(255,255,255,.22);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #191919; color: #e6e6e4;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .wrap { padding: 0 4px; max-width: 1400px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 8px; min-width: 0; }

  .btn {
    position: relative; display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; border-radius: 12px; text-decoration: none;
    border: 1px solid var(--border); overflow: hidden; cursor: pointer;
    transition:
      background-color 280ms cubic-bezier(0.32,0.72,0,1),
      border-color 280ms cubic-bezier(0.32,0.72,0,1),
      box-shadow 380ms cubic-bezier(0.32,0.72,0,1),
      transform 180ms cubic-bezier(0.32,0.72,0,1);
    -webkit-tap-highlight-color: transparent;
    min-height: 58px;
  }
  .btn::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 50%);
    pointer-events: none;
  }
  .btn:active { transform: scale(.975); transition-duration: 120ms; }
  .btn:focus-visible { outline: 2px solid rgba(255,255,255,.4); outline-offset: 2px; }

  .icon {
    flex: 0 0 auto; width: 26px; height: 26px; display: grid; place-items: center;
    border-radius: 7px; background: rgba(255,255,255,.06);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .icon svg { width: 16px; height: 16px; display: block; }

  .meta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; line-height: 1.15;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { margin-top: 4px; font-size: 12.5px; opacity: .55;
         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .count {
    flex: 0 0 auto;
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px;
    background: rgba(255,255,255,.1);
    color: rgba(255,255,255,.85);
    min-width: 20px; text-align: center;
    transition: background-color 200ms ease;
  }
  .btn:hover .count { background: rgba(255,255,255,.16); }

  .chevron {
    flex: 0 0 auto; margin-left: 2px;
    transition: transform 280ms cubic-bezier(0.32,0.72,0,1);
    opacity: .6;
  }
  .col.open .chevron { transform: rotate(180deg); }

  .btn.gray   { background: var(--gray-bg);   color: var(--gray-text); }
  .btn.blue   { background: var(--blue-bg);   color: var(--blue-text); }
  .btn.green  { background: var(--green-bg);  color: var(--green-text); }
  .btn.orange { background: var(--orange-bg); color: var(--orange-text); }
  .btn.gray:hover   { background: var(--gray-bg-h);   border-color: var(--border-hover); box-shadow: 0 12px 32px -12px var(--gray-glow); }
  .btn.blue:hover   { background: var(--blue-bg-h);   border-color: var(--border-hover); box-shadow: 0 12px 32px -12px var(--blue-glow); }
  .btn.green:hover  { background: var(--green-bg-h);  border-color: var(--border-hover); box-shadow: 0 12px 32px -12px var(--green-glow); }
  .btn.orange:hover { background: var(--orange-bg-h); border-color: var(--border-hover); box-shadow: 0 12px 32px -12px var(--orange-glow); }

  .files {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 0; overflow: hidden;
    transition: max-height 320ms cubic-bezier(0.32,0.72,0,1);
  }
  .col.open .files { max-height: 220px; }

  .file {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 9px; text-decoration: none;
    border: 1px solid var(--border);
    font-size: 13px;
    transition: background-color 200ms ease, border-color 200ms ease;
    min-height: 38px;
  }
  .file:hover { border-color: var(--border-hover); }
  .file .fdot { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; }
  .file .fname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file .farrow { opacity: 0; transform: translateX(-3px); transition: all 200ms ease; font-size: 12px; }
  .file:hover .farrow { opacity: .7; transform: translateX(0); }

  .file.gray   { background: rgba(120,120,120,.08); color: var(--gray-text); }
  .file.blue   { background: rgba(31,59,84,.5);    color: var(--blue-text); }
  .file.green  { background: rgba(28,56,41,.5);    color: var(--green-text); }
  .file.orange { background: rgba(92,58,30,.5);    color: var(--orange-text); }
  .file.gray:hover   { background: rgba(120,120,120,.14); }
  .file.blue:hover   { background: rgba(31,59,84,.75); }
  .file.green:hover  { background: rgba(28,56,41,.75); }
  .file.orange:hover { background: rgba(92,58,30,.75); }

  .file.gray   .fdot { background: #bababa; }
  .file.blue   .fdot { background: #4285f4; }
  .file.green  .fdot { background: #0f9d58; }
  .file.orange .fdot { background: #f4b400; }

  .file-add {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 12px; border-radius: 9px; cursor: pointer;
    border: 1px dashed rgba(255,255,255,.15);
    font-size: 12px; color: rgba(255,255,255,.45);
    transition: all 200ms ease;
    min-height: 36px;
    background: transparent;
  }
  .file-add:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.75); background: rgba(255,255,255,.03); }

  .fedit {
    flex: 0 0 auto; width: 20px; height: 20px; border-radius: 5px;
    display: grid; place-items: center;
    background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.6); cursor: pointer;
    opacity: 0; transition: all 180ms ease;
  }
  .file:hover .fedit { opacity: 1; }
  .fedit:hover { background: rgba(0,0,0,.5); color: #fff; }
  .fedit svg { width: 10px; height: 10px; }

  .gedit {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 6px;
    display: grid; place-items: center;
    background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.7); cursor: pointer;
    opacity: 0; transition: all 160ms ease; z-index: 2;
  }
  .btn:hover .gedit { opacity: 1; }
  .gedit:hover { background: rgba(0,0,0,.5); color: #fff; }
  .gedit svg { width: 11px; height: 11px; }

  @media (max-width: 720px) {
    .wrap { padding: 0 2px; }
    .btn { padding: 12px 12px; gap: 9px; min-height: 50px; border-radius: 10px; }
    .title { font-size: 13px; }
    .sub { display: none; }
    .icon { width: 22px; height: 22px; }
    .icon svg { width: 14px; height: 14px; }
    .grid { gap: 8px; }
    .file { padding: 7px 9px; font-size: 12px; min-height: 32px; }
    .chevron { display: none; }
  }
  @media (max-width: 460px) {
    .btn { padding: 10px 9px; gap: 7px; min-height: 46px; }
    .title { font-size: 12px; }
    .icon { width: 20px; height: 20px; }
  }
  @media (hover: none) {
    .gedit, .fedit { display: none !important; }
    .file-add { opacity: .6; }
  }

  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px;
  }
  .modal-back.open { display: flex; }
  .modal {
    width: 100%; max-width: 460px; background: #1f1f1f;
    border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 22px;
    color: #e6e6e4; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .modal h3 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  .modal .hint { margin: 0 0 16px; font-size: 12px; color: #9b9a97; }
  .modal label { display: block; font-size: 11px; text-transform: uppercase;
                 letter-spacing: .06em; color: #9b9a97; margin: 12px 0 6px; }
  .modal input {
    width: 100%; padding: 10px 12px; background: #2a2a2a; border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px; color: #e6e6e4; font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 120ms ease;
  }
  .modal input:focus { border-color: rgba(120,170,220,.5); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions button {
    flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);
    background: #2a2a2a; color: #e6e6e4; font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: background 120ms ease;
  }
  .modal-actions button:hover { background: #333; }
  .modal-actions .primary { background: #2b6cb0; border-color: #2b6cb0; }
  .modal-actions .primary:hover { background: #3479c4; }
  .modal-actions .danger { background: #5a1f1f; border-color: #5a1f1f; color: #f4b4b4; }
  .modal-actions .danger:hover { background: #6b2424; }
  .copy-box {
    margin-top: 14px; padding: 10px 12px; background: #161616;
    border: 1px solid rgba(255,255,255,.06); border-radius: 8px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    color: #9bd0a4; word-break: break-all; display: none;
  }
  .copy-box.show { display: block; }
  .copy-box .ok { color: #6ee787; display: block; margin-bottom: 4px; font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modalTitle">Изменить</h3>
      <p class="hint">Сохранение создаст новый embed-URL — вставьте его в Notion вместо текущего.</p>
      <label for="iLabel">Название</label>
      <input id="iLabel" type="text" placeholder="Например: Расчёт цен Q3" />
      <label for="iSub" id="lblSub">Подпись (опционально)</label>
      <input id="iSub" type="text" placeholder="Например: Таблицы" />
      <label for="iUrl">Ссылка</label>
      <input id="iUrl" type="url" placeholder="https://..." />
      <div class="modal-actions">
        <button id="btnDelete" class="danger" style="display:none">Удалить</button>
        <button id="btnCancel">Отмена</button>
        <button id="btnSave" class="primary">Сохранить</button>
      </div>
      <div class="copy-box" id="copyBox">
        <span class="ok">✓ Новый embed URL скопирован</span>
        <span id="copyUrl"></span>
      </div>
    </div>
  </div>

<script>
(function() {
  const GROUPS = {
    drive: {
      cls: "gray", label: "Drive", sub: "Папка задачи",
      url: "https://drive.google.com/drive/my-drive?hl=ru",
      icon: `<svg viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
        <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
        <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
        <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
        <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
        <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
        <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
      </svg>`
    },
    docs: {
      cls: "blue", label: "Docs", sub: "Документы",
      url: "https://docs.new",
      icon: `<svg viewBox="0 0 47 65" xmlns="http://www.w3.org/2000/svg">
        <path d="M29.375 0H4.40625C1.97266 0 0 1.97266 0 4.40625V60.5938C0 63.0273 1.97266 65 4.40625 65H42.5938C45.0273 65 47 63.0273 47 60.5938V17.625L36.7188 10.2812L29.375 0Z" fill="#4285F4"/>
        <path d="M12.0312 47.4062H34.9688V44.4688H12.0312V47.4062ZM12.0312 35.6562V38.5938H34.9688V35.6562H12.0312ZM12.0312 26.8438V29.7812H26.1562V26.8438H12.0312ZM12.0312 18.0312V20.9688H34.9688V18.0312H12.0312Z" fill="#F1F1F1"/>
        <path d="M29.375 0V13.2188C29.375 15.6523 31.3477 17.625 33.7812 17.625H47L29.375 0Z" fill="#A1C2FA"/>
      </svg>`
    },
    sheets: {
      cls: "green", label: "Sheets", sub: "Таблицы",
      url: "https://sheets.new",
      icon: `<svg viewBox="0 0 47 65" xmlns="http://www.w3.org/2000/svg">
        <path d="M29.375 0H4.40625C1.97266 0 0 1.97266 0 4.40625V60.5938C0 63.0273 1.97266 65 4.40625 65H42.5938C45.0273 65 47 63.0273 47 60.5938V17.625L36.7188 10.2812L29.375 0Z" fill="#0F9D58"/>
        <path d="M11.75 31.7188V49.7812H35.25V31.7188H11.75ZM22.0312 47.4062H14.1875V43.0156H22.0312V47.4062ZM22.0312 41.0938H14.1875V36.7031H22.0312V41.0938ZM32.8125 47.4062H24.9688V43.0156H32.8125V47.4062ZM32.8125 41.0938H24.9688V36.7031H32.8125V41.0938ZM32.8125 34.7344H14.1875V32.5781H32.8125V34.7344Z" fill="#F1F1F1"/>
        <path d="M29.375 0V13.2188C29.375 15.6523 31.3477 17.625 33.7812 17.625H47L29.375 0Z" fill="#87CEAC"/>
      </svg>`
    },
    slides: {
      cls: "orange", label: "Slides", sub: "Презентации",
      url: "https://slides.new",
      icon: `<svg viewBox="0 0 47 65" xmlns="http://www.w3.org/2000/svg">
        <path d="M29.375 0H4.40625C1.97266 0 0 1.97266 0 4.40625V60.5938C0 63.0273 1.97266 65 4.40625 65H42.5938C45.0273 65 47 63.0273 47 60.5938V17.625L36.7188 10.2812L29.375 0Z" fill="#F4B400"/>
        <path d="M13.2188 26.8438V46.3281H33.7812V26.8438H13.2188ZM30.8438 43.3906H16.1562V29.7812H30.8438V43.3906Z" fill="#F1F1F1"/>
        <path d="M29.375 0V13.2188C29.375 15.6523 31.3477 17.625 33.7812 17.625H47L29.375 0Z" fill="#FADA80"/>
      </svg>`
    }
  };

  const MAX_FILES = 3;
  const params = new URLSearchParams(window.location.search);

  const config = {};
  for (const key of ['drive','docs','sheets','slides']) {
    const g = GROUPS[key];
    config[key] = {
      ...g,
      url:   params.get(key + '_url')   || g.url,
      label: params.get(key + '_label') || g.label,
      sub:   params.get(key + '_sub')   || g.sub,
      files: []
    };
    for (let i = 1; i <= MAX_FILES; i++) {
      const fUrl = params.get(`${key}_f${i}_url`);
      const fName = params.get(`${key}_f${i}_name`);
      if (fUrl) config[key].files.push({ url: fUrl, name: fName || `Файл ${i}` });
    }
  }

  const grid = document.getElementById('grid');
  const editIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`;
  const chevronSvg = `<svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  for (const key of ['drive','docs','sheets','slides']) {
    const c = config[key];

    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.key = key;

    const btn = document.createElement('a');
    btn.className = 'btn ' + c.cls;
    btn.href = c.url;
    btn.target = '_blank';
    btn.rel = 'noopener noreferrer';
    btn.setAttribute('aria-label', c.label);
    btn.innerHTML = `
      <span class="icon">${c.icon}</span>
      <span class="meta">
        <span class="title">${escapeHtml(c.label)}</span>
        <span class="sub">${escapeHtml(c.sub)}</span>
      </span>
      <span class="count">${c.files.length}</span>
      ${chevronSvg}
      <button class="gedit" aria-label="Изменить группу" title="Изменить группу">${editIcon}</button>
    `;

    btn.addEventListener('click', (e) => {
      const ed = e.target.closest('.gedit');
      if (ed) {
        e.preventDefault(); e.stopPropagation();
        openModal({ key, type: 'group' });
        return;
      }
      if (c.files.length > 0) {
        e.preventDefault();
        col.classList.toggle('open');
      }
    });

    col.appendChild(btn);

    const filesEl = document.createElement('div');
    filesEl.className = 'files';
    col.appendChild(filesEl);

    renderFiles(key, col);
    grid.appendChild(col);
  }

  function renderFiles(key, col) {
    const c = config[key];
    const filesEl = col.querySelector('.files');
    filesEl.innerHTML = '';

    c.files.forEach((f, idx) => {
      const a = document.createElement('a');
      a.className = 'file ' + c.cls;
      a.href = f.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <span class="fdot"></span>
        <span class="fname">${escapeHtml(f.name)}</span>
        <button class="fedit" aria-label="Изменить файл" title="Изменить файл">${editIcon}</button>
        <span class="farrow">↗</span>
      `;
      a.addEventListener('click', (e) => {
        const ed = e.target.closest('.fedit');
        if (ed) {
          e.preventDefault(); e.stopPropagation();
          openModal({ key, type: 'file', index: idx });
        }
      });
      filesEl.appendChild(a);
    });

    if (c.files.length < MAX_FILES) {
      const add = document.createElement('div');
      add.className = 'file-add';
      add.innerHTML = `+ добавить файл`;
      add.addEventListener('click', () => openModal({ key, type: 'file', index: -1 }));
      filesEl.appendChild(add);
    }

    const cnt = col.querySelector('.count');
    if (cnt) cnt.textContent = c.files.length;
  }

  // Modal
  const modal = document.getElementById('modalBack');
  const modalTitle = document.getElementById('modalTitle');
  const iLabel = document.getElementById('iLabel');
  const iSub = document.getElementById('iSub');
  const iUrl = document.getElementById('iUrl');
  const lblSub = document.getElementById('lblSub');
  const btnSave = document.getElementById('btnSave');
  const btnCancel = document.getElementById('btnCancel');
  const btnDelete = document.getElementById('btnDelete');
  const copyBox = document.getElementById('copyBox');
  const copyUrl = document.getElementById('copyUrl');
  let editing = null;

  function openModal(ctx) {
    editing = ctx;
    const c = config[ctx.key];
    copyBox.classList.remove('show');

    if (ctx.type === 'group') {
      modalTitle.textContent = 'Изменить группу: ' + c.label;
      iLabel.value = c.label;
      iSub.value = c.sub || '';
      iUrl.value = c.url;
      btnDelete.style.display = 'none';
      iSub.style.display = ''; lblSub.style.display = '';
    } else {
      if (ctx.index === -1) {
        modalTitle.textContent = 'Добавить файл в: ' + c.label;
        iLabel.value = ''; iUrl.value = '';
        btnDelete.style.display = 'none';
      } else {
        const f = c.files[ctx.index];
        modalTitle.textContent = 'Изменить файл в: ' + c.label;
        iLabel.value = f.name; iUrl.value = f.url;
        btnDelete.style.display = '';
      }
      iSub.value = ''; iSub.style.display = 'none'; lblSub.style.display = 'none';
    }

    modal.classList.add('open');
    setTimeout(() => iUrl.focus(), 50);
  }

  btnCancel.addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('open'); });

  btnDelete.addEventListener('click', () => {
    if (!editing || editing.type !== 'file' || editing.index < 0) return;
    config[editing.key].files.splice(editing.index, 1);
    refreshAndGenerate(editing.key);
  });

  btnSave.addEventListener('click', () => {
    if (!editing) return;
    const newLabel = iLabel.value.trim();
    const newSub = iSub.value.trim();
    const newUrl = iUrl.value.trim();

    if (editing.type === 'group') {
      const c = config[editing.key];
      if (newLabel) c.label = newLabel;
      if (newSub) c.sub = newSub;
      if (newUrl) c.url = newUrl;
    } else {
      if (!newUrl) return;
      const c = config[editing.key];
      const name = newLabel || 'Файл';
      if (editing.index === -1) {
        if (c.files.length >= MAX_FILES) return;
        c.files.push({ url: newUrl, name });
      } else {
        c.files[editing.index] = { url: newUrl, name };
      }
    }
    refreshAndGenerate(editing.key);
  });

  function refreshAndGenerate(key) {
    const col = grid.querySelector(`.col[data-key="${key}"]`);
    if (col) {
      const c = config[key];
      const btn = col.querySelector('.btn');
      btn.href = c.url;
      btn.querySelector('.title').textContent = c.label;
      btn.querySelector('.sub').textContent = c.sub;
      renderFiles(key, col);
      if (c.files.length > 0) col.classList.add('open');
    }

    const p = new URLSearchParams();
    for (const k of ['drive','docs','sheets','slides']) {
      const def = GROUPS[k], cur = config[k];
      if (cur.url   !== def.url)   p.set(k + '_url',   cur.url);
      if (cur.label !== def.label) p.set(k + '_label', cur.label);
      if (cur.sub   !== def.sub)   p.set(k + '_sub',   cur.sub);
      cur.files.forEach((f, i) => {
        p.set(`${k}_f${i+1}_url`,  f.url);
        p.set(`${k}_f${i+1}_name`, f.name);
      });
    }

    const base = window.location.origin + window.location.pathname;
    const newEmbedUrl = base + (p.toString() ? '?' + p.toString() : '');

    copyUrl.textContent = newEmbedUrl;
    copyBox.classList.add('show');

    try { navigator.clipboard.writeText(newEmbedUrl); }
    catch (err) {
      const t = document.createElement('textarea');
      t.value = newEmbedUrl; document.body.appendChild(t); t.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(t);
    }
  }
})();
</script>
</body>
</html>
